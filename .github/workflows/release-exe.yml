name: Release Windows EXE

permissions:
  contents: write
  
on:
  release:
    types: [published]

jobs:
  build-release-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Windows build tools
        run: |
          choco install visualstudio2022buildtools --quiet --no-progress
          choco install visualstudio2022-workload-vctools --quiet --no-progress

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build Windows executable
        run: pkg cli/index.js --targets node18-win-x64 --output sig-server.exe

      - name: Upload Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: sig-server.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
